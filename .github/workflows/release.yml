name: Release

on:
  push:
    branches: [master]

permissions: {}

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository_owner == 'borapesa'
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Exchange OIDC token for npm publish token
        run: |
          echo "::group::OIDC token exchange"
          OIDC_RESP=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://registry.npmjs.org")
          echo "OIDC token obtained (length: ${#OIDC_RESP})"
          OIDC_TOKEN=$(echo "$OIDC_RESP" | jq -r .value)
          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "Failed to get OIDC token. Response:"
            echo "$OIDC_RESP" | head -5
            exit 1
          fi
          NPM_RESP=$(curl -sS -X POST \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            "https://registry.npmjs.org/-/npm/v1/oidc/token")
          echo "npm OIDC exchange response:"
          echo "$NPM_RESP" | head -5
          NPM_TOKEN=$(echo "$NPM_RESP" | jq -r .token)
          if [ -z "$NPM_TOKEN" ] || [ "$NPM_TOKEN" = "null" ]; then
            echo "Failed to exchange OIDC for npm token."
            exit 1
          fi
          echo "NPM_TOKEN obtained successfully"
          echo "NPM_TOKEN=$NPM_TOKEN" >> $GITHUB_ENV
          echo "::endgroup::"

      - run: pnpm install --frozen-lockfile

      - name: Auto-generate changesets from commits
        run: node .github/scripts/auto-changeset.mjs

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm ci:version
          publish: pnpm ci:release
          title: 'chore: release'
          commit: 'chore: release'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
