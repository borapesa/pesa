name: Release

on:
  push:
    branches: [master]

permissions: {}

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository_owner == 'borapesa'
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Auto-generate changesets from commits
        run: node .github/scripts/auto-changeset.mjs

      - name: Configure pnpm for OIDC publishing
        run: |
          pnpm config set registry https://registry.npmjs.org
          pnpm config set @borapesa:registry https://registry.npmjs.org
          pnpm config delete //registry.npmjs.org/:_authToken 2>/dev/null || true
          echo "=== pnpm config ===" && pnpm config list

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm ci:version
          publish: pnpm ci:release
          title: 'chore: release'
          commit: 'chore: release'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
