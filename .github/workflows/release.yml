name: Release

on:
  push:
    branches: [master]

permissions: {}

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository_owner == 'borapesa'
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # setup-node writes registry config (needed) but also writes _authToken=
      # (empty) when its OIDC exchange fails. The empty _authToken blocks npm 10's
      # native OIDC auth flow. Removing it lets npm --provenance handle both auth
      # and attestation — proven working by the provenance signatures in every run.
      - run: npm config delete //registry.npmjs.org/:_authToken

      - run: pnpm install --frozen-lockfile

      - name: Auto-generate changesets from commits
        run: node .github/scripts/auto-changeset.mjs

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm ci:version
          publish: pnpm ci:release
          title: 'chore: release'
          commit: 'chore: release'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
