pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{ts,tsx,js,jsx,json,md,yaml,yml}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      glob: "*.ts"
      run: pnpm typecheck

pre-push:
  commands:
    test:
      run: pnpm test
